name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.3.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd backend
          source venv/bin/activate
          pyinstaller open_adventure.spec --clean

      - name: Package binary
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="v${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"

          mkdir -p dist/open-adventure
          cp backend/dist/open-adventure dist/open-adventure/

          cat > dist/open-adventure/start.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          if [ ! -f "./open-adventure" ]; then
              echo "❌ 错误: 找不到可执行文件 open-adventure"
              exit 1
          fi
          echo "=========================================="
          echo "Open Adventure - Claude Manager"
          echo "=========================================="
          echo ""
          echo "正在启动服务..."
          echo ""
          ./open-adventure
          EOF

          chmod +x dist/open-adventure/start.sh

          cd dist
          tar -czf "open_adventure-v${VERSION}-macos-arm64.tar.gz" open-adventure/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.tar.gz

  build-linux-compat:
    name: Build Linux Compatible (Ubuntu 20.04 via Docker)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build binary in Ubuntu 20.04 container
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ubuntu:20.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive

              # 安装基础依赖
              apt-get update
              apt-get install -y software-properties-common curl

              # 添加 deadsnakes PPA 并安装 Python 3.11
              add-apt-repository ppa:deadsnakes/ppa -y
              apt-get update
              apt-get install -y python3.11

              # 验证 Python 安装
              python3.11 --version

              # 安装 pip（使用 ensurepip）
              python3.11 -m ensurepip --default-pip || true
              python3.11 -m pip install --upgrade pip

              # 创建虚拟环境（不使用 venv，直接用 pip）
              cd /workspace/backend
              python3.11 -m pip install virtualenv
              python3.11 -m virtualenv venv
              . venv/bin/activate

              # 验证虚拟环境中的 Python 版本
              python --version

              # 安装 Python 依赖
              pip install --upgrade pip
              pip install -r requirements.txt
              pip install pyinstaller

              # 构建二进制
              pyinstaller open_adventure.spec --clean
            "

      - name: Package binary
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="v${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"

          mkdir -p dist/open-adventure
          cp backend/dist/open-adventure dist/open-adventure/

          cat > dist/open-adventure/start.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          if [ ! -f "./open-adventure" ]; then
              echo "❌ 错误: 找不到可执行文件 open-adventure"
              exit 1
          fi
          echo "=========================================="
          echo "Open Adventure - Claude Manager"
          echo "=========================================="
          echo ""
          echo "正在启动服务..."
          echo ""
          ./open-adventure
          EOF

          chmod +x dist/open-adventure/start.sh

          cd dist
          tar -czf "open_adventure-v${VERSION}-linux-x86_64-compat.tar.gz" open-adventure/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-compat
          path: dist/*.tar.gz

  build-linux-latest:
    name: Build Linux Latest (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd backend
          source venv/bin/activate
          pyinstaller open_adventure.spec --clean

      - name: Package binary
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="v${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"

          mkdir -p dist/open-adventure
          cp backend/dist/open-adventure dist/open-adventure/

          cat > dist/open-adventure/start.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          if [ ! -f "./open-adventure" ]; then
              echo "❌ 错误: 找不到可执行文件 open-adventure"
              exit 1
          fi
          echo "=========================================="
          echo "Open Adventure - Claude Manager"
          echo "=========================================="
          echo ""
          echo "正在启动服务..."
          echo ""
          ./open-adventure
          EOF

          chmod +x dist/open-adventure/start.sh

          cd dist
          tar -czf "open_adventure-v${VERSION}-linux-x86_64-latest.tar.gz" open-adventure/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-latest
          path: dist/*.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux-compat, build-linux-latest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-arm64/*.tar.gz
            artifacts/linux-compat/*.tar.gz
            artifacts/linux-latest/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
