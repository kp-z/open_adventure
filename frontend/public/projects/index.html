<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - Open Adventure</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f111a 0%, #1a1a2e 100%);
        color: #e5e7eb;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 60px;
      }

      .header h1 {
        font-size: 48px;
        font-weight: 700;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }

      .header p {
        font-size: 18px;
        color: #8892b0;
      }

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 30px;
      }

      .project-card {
        background: linear-gradient(145deg, #1f1f2e, #16162a);
        border-radius: 16px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .project-card:hover {
        transform: translateY(-5px);
        border-color: #00d4ff;
        box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
      }

      .project-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin-bottom: 20px;
      }

      .project-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #fff;
      }

      .project-description {
        font-size: 14px;
        color: #8892b0;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .project-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .project-tag {
        padding: 4px 12px;
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 6px;
        font-size: 12px;
        color: #00d4ff;
      }

      .back-button {
        display: inline-block;
        padding: 12px 24px;
        background: linear-gradient(145deg, #2a2a3e, #1f1f2e);
        color: #8892b0;
        border: 2px solid #3a3a4e;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s;
        margin-bottom: 40px;
      }

      .back-button:hover {
        color: #00d4ff;
        border-color: #00d4ff;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/" class="back-button">← Back to Open Adventure</a>

      <div class="header">
        <h1>Projects</h1>
        <p>Explore interactive demos and mini-projects</p>
      </div>

      <div class="projects-grid">
        <!-- Controller Project -->
        <a href="/projects/controller/index.html" class="project-card" target="_blank">
          <div class="project-icon">🎛️</div>
          <h2 class="project-title">Controller - 快捷键配置工具</h2>
          <p class="project-description">
            本地快捷键配置工具，支持自定义按钮绑定、一键执行 Shell 命令、硬件风格 UI 设计。
          </p>
          <div class="project-tags">
            <span class="project-tag">快捷键</span>
            <span class="project-tag">Shell</span>
            <span class="project-tag">配置工具</span>
          </div>
        </a>

        <!-- Placeholder for future projects -->
        <div class="project-card" style="opacity: 0.5; cursor: not-allowed;">
          <div class="project-icon">🚀</div>
          <h2 class="project-title">Coming Soon</h2>
          <p class="project-description">
            More exciting projects are on the way. Stay tuned!
          </p>
          <div class="project-tags">
            <span class="project-tag">Future</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
